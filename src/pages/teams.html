---
title: Teams
description: Teams
layout: page.njk
---

<div class="o-css-grid">
  <article>
    <div class="family-teams__wrapper">
      {% for item in data.allocatedTeams %}
        <div class="family-teams__details flow">
          <div class="family-teams__member">
            <img src="/images/family/{{ item.familyMember | downcase }}.svg" width="21" height="21" class="family-icon" alt="{{ item.familyMember }} family icon" />
            <h2 class="family-teams__title">{{ item.familyMember }}</h2>
          </div>
          <div class="family-teams__teams flow">
            {% for team in item.teams %}
              <div class="family-teams__team">
                <p>{{ team.name }}</p>
              </div>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
    </div>
  </article>
</div>
